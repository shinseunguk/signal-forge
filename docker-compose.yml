services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sf
      POSTGRES_PASSWORD: sf
      POSTGRES_DB: signal_forge
    ports:
      # 로컬에 이미 5432 를 쓰는 PostgreSQL 이 있어 호스트 포트는 5433 으로 노출.
      - "5433:5432"
    volumes:
      - sf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sf -d signal_forge"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://sf:sf@db:5432/signal_forge
      PORTFOLIO_INITIAL_CASH: 100000000
      PORTFOLIO_NAME: signal-forge-main
      DAILY_LOSS_LIMIT_PCT: 3
      MAX_POSITION_WEIGHT_PCT: 20
    ports:
      - "3000:3000"
    # 부팅 시 마이그레이션 → 시드 → 앱 실행 순으로 수행.
    command: sh -c "npm run migrate:prod && npm run seed:prod && node dist/main.js"

volumes:
  sf_pgdata:
